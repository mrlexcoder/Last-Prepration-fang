function h2(cls,txt){const e=document.createElement("h2");e.className=cls;e.textContent=txt;document.getElementById("root").prepend(e);}

const allQ=D.topics.flatMap(t=>t.qs.map(q=>({...q,topicId:t.id,topicName:t.name})));
const dColor={Easy:"#1D9E75",Medium:"#BA7517",Hard:"#A32D2D"};
const dBg={Easy:"#E1F5EE",Medium:"#FAEEDA",Hard:"#FCEBEB"};
const PER=20;

let state={tab:"all",topic:"all",diff:"all",search:"",page:1};

function getFiltered(){
  return allQ.filter(q=>{
    if(state.tab==="must"&&!q.must)return false;
    if(state.tab==="beg"&&!q.beg)return false;
    if(state.tab==="faang"&&!q.faang)return false;
    if(state.tab==="dp"&&!q.dp)return false;
    if(state.topic!=="all"&&q.topicId!==state.topic)return false;
    if(state.diff!=="all"&&q.d!==state.diff)return false;
    const s=state.search.toLowerCase();
    if(s&&!q.name.toLowerCase().includes(s)&&!q.co.join().toLowerCase().includes(s)&&!q.pat.toLowerCase().includes(s))return false;
    return true;
  });
}

const roadmap=[
  {w:"Week 1 (Days 1–7)",t:"Arrays, Strings, Hashing, Two Pointers",tasks:["Complete all beginner questions first","Master sliding window & two pointer patterns","Solve 2–3 LeetCode easy per day","Understand time/space complexity of each approach"]},
  {w:"Week 2 (Days 8–14)",t:"Recursion, Backtracking, Stack, Queue",tasks:["Solve all permutation/combination patterns","Master monotonic stack (daily temps, histogram)","Design problems: MinStack, LRU Cache","5+ backtracking problems with pruning"]},
  {w:"Week 3 (Days 15–21)",t:"Linked List, Trees, BST, Heaps",tasks:["All classic linked list: reverse, merge, cycle","Tree DFS and BFS traversals from memory","Heap patterns: Kth largest, median stream","2 hard problems per day with timer"]},
  {w:"Week 4 (Days 22–30)",t:"Graphs, DP, Tries, Binary Search + Mock OAs",tasks:["All graph BFS/DFS/Topo problems","Complete Top 30 DP questions","Binary search on answer pattern","2 full-length timed mock OAs"]}
];

const tips=[
  {t:"Pattern First",d:"Identify the pattern before coding. 80% of questions map to ~15 patterns."},
  {t:"Think Aloud",d:"Interviewers value reasoning. Narrate edge cases and complexity."},
  {t:"Brute Force First",d:"Always mention brute force then optimize. Shows structured thinking."},
  {t:"Test with Examples",d:"Trace through 2–3 examples including edge cases before submitting."},
  {t:"Know Complexities",d:"HashMap O(1), BST O(logN), sorting O(nlogn). Be ready to justify."},
  {t:"Practice Under Time",d:"30–45 min per problem, no hints. Mirror real interview pressure."},
];

const mistakes=[
  "Jumping to code without planning the approach",
  "Ignoring edge cases (null, empty, single element, overflow)",
  "Not verifying with examples during the interview",
  "Practicing too many problems without understanding patterns",
  "Neglecting time and space complexity analysis",
  "Skipping 'easy' problems — they appear in OAs too",
  "Not communicating during the interview",
  "Memorizing solutions instead of understanding the approach",
];

const platforms=[
  {n:"LeetCode",type:"Primary",d:"Best for FAANG prep. Premium for company tags.",url:"https://leetcode.com"},
  {n:"GeeksforGeeks",type:"Primary",d:"Theory + service company OAs.",url:"https://geeksforgeeks.org"},
  {n:"HackerRank",type:"OA Prep",d:"Used by TCS, Wipro, Infosys, Accenture.",url:"https://hackerrank.com"},
  {n:"Codeforces",type:"Competitive",d:"Timed contests and competitive problems.",url:"https://codeforces.com"},
  {n:"InterviewBit",type:"Interview Prep",d:"Structured prep with company focus.",url:"https://interviewbit.com"},
  {n:"Naukri Code360",type:"OA Prep",d:"Indian service company OA patterns.",url:"https://www.naukri.com/code360"},
];

function render(){
  const filtered=getFiltered();
  const total=filtered.length;
  const pages=Math.ceil(total/PER);
  state.page=Math.min(state.page,Math.max(1,pages));
  const slice=filtered.slice((state.page-1)*PER,state.page*PER);

  const counts={all:allQ.length,must:allQ.filter(q=>q.must).length,beg:allQ.filter(q=>q.beg).length,faang:allQ.filter(q=>q.faang).length,dp:allQ.filter(q=>q.dp).length};

  document.getElementById("root").innerHTML=`
  <div style="padding:1.2rem 0.8rem;max-width:900px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <i class="ti ti-code" style="font-size:20px;color:var(--color-text-secondary)" aria-hidden="true"></i>
      <span style="font-size:20px;font-weight:500">DSA Interview Prep Sheet</span>
    </div>
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem">200+ questions · 25 topics · FAANG + service companies · 2023–2026 interview patterns</p>

    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">
      ${[["all","All Questions",counts.all],["must","🔥 Top 50 Must-Do",counts.must],["beg","🌱 Beginner 25",counts.beg],["faang","⭐ FAANG 50",counts.faang],["dp","🧩 Top DP 30",counts.dp]].map(([id,label,cnt])=>`
        <button onclick="setTab('${id}')" style="padding:5px 11px;border-radius:var(--border-radius-md);font-size:12px;${state.tab===id?"border:2px solid var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info)":"border:0.5px solid var(--color-border-secondary)"}">
          ${label} <span style="opacity:0.7">(${cnt})</span>
        </button>`).join("")}
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;align-items:center">
      <input id="srch" value="${state.search.replace(/"/g,'&quot;')}" placeholder="Search name, company, pattern…" style="flex:1 1 180px;min-width:130px" oninput="setSearch(this.value)">
      <select onchange="setTopic(this.value)" style="font-size:12px;padding:5px 8px">
        <option value="all"${state.topic==="all"?" selected":""}>All Topics</option>
        ${D.topics.map(t=>`<option value="${t.id}"${state.topic===t.id?" selected":""}>${t.name}</option>`).join("")}
      </select>
      <select onchange="setDiff(this.value)" style="font-size:12px;padding:5px 8px">
        <option value="all"${state.diff==="all"?" selected":""}>All Levels</option>
        ${["Easy","Medium","Hard"].map(d=>`<option value="${d}"${state.diff===d?" selected":""}>${d}</option>`).join("")}
      </select>
    </div>

    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">
      Showing ${Math.min(total,(state.page-1)*PER+1)}–${Math.min(total,state.page*PER)} of ${total} questions
    </div>

    <div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:14px">
      <div style="display:grid;grid-template-columns:24px 1fr 68px 130px 100px 58px;gap:0;background:var(--color-background-secondary);padding:7px 10px;font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em">
        <span>#</span><span>Question / Hint</span><span>Level</span><span>Pattern</span><span>Companies</span><span>Link</span>
      </div>
      ${slice.length===0?`<div style="padding:2rem;text-align:center;color:var(--color-text-secondary);font-size:13px">No questions found. Try adjusting filters.</div>`:""}
      ${slice.map((q,i)=>`
        <div style="display:grid;grid-template-columns:24px 1fr 68px 130px 100px 58px;gap:0;padding:9px 10px;border-top:0.5px solid var(--color-border-tertiary);background:${i%2===0?"var(--color-background-primary)":"var(--color-background-secondary)"};align-items:start">
          <span style="font-size:10px;color:var(--color-text-tertiary);padding-top:2px">${(state.page-1)*PER+i+1}</span>
          <div>
            <div style="font-size:12px;font-weight:500;margin-bottom:2px">
              ${q.name}
              ${q.must?`<span style="margin-left:4px;font-size:9px;background:#E6F1FB;color:#0C447C;border-radius:3px;padding:1px 4px">must-do</span>`:""}
              ${q.faang?`<span style="margin-left:3px;font-size:9px;background:#EEEDFE;color:#3C3489;border-radius:3px;padding:1px 4px">FAANG</span>`:""}
            </div>
            <div style="font-size:10px;color:var(--color-text-secondary)">${q.hint}</div>
          </div>
          <span style="font-size:10px;font-weight:500;color:${dColor[q.d]};background:${dBg[q.d]};border-radius:4px;padding:2px 5px;display:inline-block;text-align:center;margin-top:1px">${q.d}</span>
          <span style="font-size:10px;color:var(--color-text-secondary);padding-top:2px">${q.pat}</span>
          <div style="font-size:10px;color:var(--color-text-secondary)">
            ${q.co.slice(0,3).map(c=>`<span style="display:inline-block;margin-right:2px;margin-bottom:2px;background:var(--color-background-tertiary);border-radius:3px;padding:1px 3px">${c}</span>`).join("")}
            ${q.co.length>3?`<span style="font-size:9px;color:var(--color-text-tertiary)">+${q.co.length-3}</span>`:""}
          </div>
          <span style="font-size:10px">
            ${q.lc.startsWith("LC")?`<a href="https://leetcode.com/problems" target="_blank">${q.lc}</a>`:`<span style="color:var(--color-text-tertiary)">${q.lc}</span>`}
          </span>
        </div>`).join("")}
    </div>

    ${pages>1?`<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:20px">
      <button onclick="goPage(${state.page-1})" ${state.page===1?"disabled":""} style="padding:4px 10px;font-size:12px">← Prev</button>
      ${Array.from({length:pages},(_,i)=>i+1).filter(p=>Math.abs(p-state.page)<=2||p===1||p===pages).reduce((acc,p,idx,arr)=>{
        if(idx>0&&arr[idx-1]!==p-1)acc+=`<span style="padding:0 4px;color:var(--color-text-tertiary);font-size:12px">…</span>`;
        acc+=`<button onclick="goPage(${p})" style="padding:4px 8px;font-size:12px;${state.page===p?"border:2px solid var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info)":""}">${p}</button>`;
        return acc;
      },"")}
      <button onclick="goPage(${state.page+1})" ${state.page===pages?"disabled":""} style="padding:4px 10px;font-size:12px">Next →</button>
    </div>`:""}

    <div style="font-size:15px;font-weight:500;margin-bottom:10px">30-day roadmap</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:9px;margin-bottom:20px">
      ${roadmap.map(r=>`
        <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:11px 13px;border:0.5px solid var(--color-border-tertiary)">
          <div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:2px">${r.w}</div>
          <div style="font-size:12px;font-weight:500;margin-bottom:7px">${r.t}</div>
          ${r.tasks.map(t=>`<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;display:flex;gap:4px"><i class="ti ti-check" style="font-size:12px;color:#1D9E75;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>${t}</div>`).join("")}
        </div>`).join("")}
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:9px;margin-bottom:20px">
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:13px;border:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:13px;font-weight:500;margin-bottom:9px">Interview tips</div>
        ${tips.map(t=>`<div style="margin-bottom:7px"><span style="font-size:11px;font-weight:500">${t.t}: </span><span style="font-size:11px;color:var(--color-text-secondary)">${t.d}</span></div>`).join("")}
      </div>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:13px;border:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:13px;font-weight:500;margin-bottom:9px">Common mistakes to avoid</div>
        ${mistakes.map(m=>`<div style="display:flex;gap:5px;margin-bottom:5px;font-size:11px;color:var(--color-text-secondary)"><i class="ti ti-x" style="font-size:12px;color:#A32D2D;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>${m}</div>`).join("")}
      </div>
    </div>

    <div style="font-size:13px;font-weight:500;margin-bottom:9px">Best platforms for practice</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:7px">
      ${platforms.map(p=>`
        <a href="${p.url}" target="_blank" style="text-decoration:none;display:block;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:9px 11px">
          <div style="font-size:12px;font-weight:500;margin-bottom:3px">${p.n}</div>
          <span style="font-size:9px;background:var(--color-background-tertiary);color:var(--color-text-secondary);border-radius:3px;padding:1px 5px;display:inline-block;margin-bottom:4px">${p.type}</span>
          <div style="font-size:10px;color:var(--color-text-secondary)">${p.d}</div>
        </a>`).join("")}
    </div>
  </div>`;
}

window.setTab=function(v){state.tab=v;state.page=1;render()};
window.setTopic=function(v){state.topic=v;state.page=1;render()};
window.setDiff=function(v){state.diff=v;state.page=1;render()};
window.setSearch=function(v){state.search=v;state.page=1;render()};
window.goPage=function(p){const f=getFiltered();const pages=Math.ceil(f.length/PER);state.page=Math.max(1,Math.min(pages,p));render()};

render();
</script>
</body>
