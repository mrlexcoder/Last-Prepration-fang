<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuroraNeuroGrid MVC</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>AuroraNeuroGrid</h1>
      <p class="tagline">Brain-Scale AI Fabric — quantum-informed routing · neurone mesh · infinite-memory caching</p>
    </header>

    <section class="panel">
      <div class="row">
        <label>
          Mode
          <select id="modeSelect">
            <option value="infer">Single Infer</option>
            <option value="loop">Automation Loop</option>
            <option value="chat">Chat (memory)</option>
            <option value="search">Search (RAG)</option>
            <option value="tools">Tools</option>
            <option value="pipeline">Pipeline</option>
          </select>
        </label>
        <label>
          Runtime hint
          <input id="runtimeHint" type="text" placeholder="llama.cpp / qwen-2.5-4b-instruct" />
        </label>
      </div>

      <label for="inputText">Input / Prompt</label>
      <textarea id="inputText" placeholder="Ask the system anything...">Explain the next action for a prediction network.</textarea>

      <div class="row" id="inferOptions">
        <label>
          Latency budget (ms)
          <input id="latencyBudget" type="number" value="200" min="10" />
        </label>
        <label>
          Max loop iterations
          <input id="maxIterations" type="number" value="3" min="1" max="10" />
        </label>
      </div>
      <div class="row">
        <label>
          Confidence threshold
          <input id="confidenceThreshold" type="number" value="0.85" min="0" max="1" step="0.05" />
        </label>
        <label>
          Pipeline steps (comma-separated)
          <input id="pipelineSteps" type="text" placeholder="step1, step2, step3" />
        </label>
      </div>

      <div class="btn-row">
        <button id="executeBtn">Execute</button>
        <button id="connectorsBtn" class="ghost">List connectors</button>
        <button id="agiBtn" class="ghost">AGI status</button>
        <button id="cacheBtn" class="ghost">Cache stats</button>
      </div>
    </section>

    <section class="panel">
      <h2>Result</h2>
      <pre id="resultOutput">Ready.</pre>
    </section>
  </main>
  <script src="/static/main.js"></script>
</body>
</html>
