<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuroraNeuroGrid MVC</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>AuroraNeuroGrid MVC</h1>
      <p>Quantum-informed routing · Neurone mesh orchestration · Automation loop engine</p>
    </header>

    <section class="panel">
      <label for="inputText">Input prompt</label>
      <textarea id="inputText" placeholder="Ask the system anything...">Explain the next action for a prediction network.</textarea>
      <div class="row">
        <label>
          Latency budget (ms)
          <input id="latencyBudget" type="number" value="120" min="10" />
        </label>
        <label>
          Runtime hint
          <input id="runtimeHint" type="text" placeholder="qwen-2.5-4b-instruct" />
        </label>
      </div>
      <div class="row">
        <label>
          Max loop iterations
          <input id="maxIterations" type="number" value="3" min="1" max="10" />
        </label>
        <label>
          Confidence threshold
          <input id="confidenceThreshold" type="number" value="0.85" min="0" max="1" step="0.05" />
        </label>
      </div>
      <div class="btn-row">
        <button id="invokeBtn">Execute (single)</button>
        <button id="loopBtn" class="secondary">Execute (loop)</button>
        <button id="connectorsBtn" class="ghost">List connectors</button>
      </div>
    </section>

    <section class="panel" id="outputPanel">
      <h2>Result</h2>
      <pre id="resultOutput">Ready.</pre>
    </section>
  </main>
  <script src="/static/main.js"></script>
</body>
</html>
